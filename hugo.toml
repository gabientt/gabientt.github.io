baseURL = "https://gabientt.github.io/"
languageCode = "pt-br"
title = "Enquanto Compila | Gabriely Vicente"
theme = "PaperMod"

[params]
  description = "Projetos e anotações de uma engenheira de computação"
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  defaultTheme = "dark"
  customCSS = ["css/custom.css"]
[params.homeInfoParams]
  Title = "Enquanto Compila"
  Content = "<div style='text-align: justify;'>Olá! Eu sou Gabriely Vicente, estudante do último ano de Engenharia de Computação no Instituto Federal Fluminense e esse é o Enquanto Compila.<br><br>Um espaço que nasceu de uma vontade de documentar projetos e problemas reais e o raciocínio por trás de cada uma das soluções da forma menos complicada possível.<br><br>Enquanto Compila é aquela sensação de bater um papo no cafezinho da tarde, com bolinho quente e conversa boa. Entender um código é importante mas não precisa ser complicado.</div>"
